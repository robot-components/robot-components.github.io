name Deploy to GitHub Pages

on
  push
    branches [main]
  workflow_dispatch

permissions
  contents read
  pages write
  id-token write

concurrency
  group pages
  cancel-in-progress true

jobs
  deploy
    environment
      name github-pages
      url ${{ steps.deployment.outputs.page_url }}
    runs-on ubuntu-latest

    steps
      - name Checkout
        uses actionscheckout@v4

      - name Setup Node
        uses actionssetup-node@v4
        with
          node-version 20
          cache npm

      - name Install dependencies
        run npm ci

      - name Build
        run npm run build

      - name Setup Pages
        uses actionsconfigure-pages@v5

      - name Upload artifact
        uses actionsupload-pages-artifact@v3
        with
          path .dist

      - name Deploy
        id deployment
        uses actionsdeploy-pages@v4